<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!--
      Samsung Tizen / LG webOS viewport strategy:
      - Use device-width so the browser reports the actual screen width
      - initial-scale=1.0 ensures no zoom
      - The app container is fixed at 1920x1080 and scaled via CSS transform
        to always fill the screen regardless of reported resolution
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Cinemania</title>
    <style>
      *, *::before, *::after {
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border: 0;
      }

      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #141414;
      }

      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #141414;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /*
        Scale the 1920x1080 app to fill any screen size.
        This is the standard technique for TV apps deployed on
        Samsung Tizen and LG webOS with varying reported resolutions.
      */
      #app-scaler {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        -webkit-transform-origin: top left;
        transform-origin: top left;
      }
    </style>
    <script>
      // Scale the app container to fill the actual screen
      function scaleApp() {
        var scaler = document.getElementById('app-scaler');
        if (!scaler) return;
        var scaleX = window.innerWidth  / 1920;
        var scaleY = window.innerHeight / 1080;
        var scale  = Math.min(scaleX, scaleY);
        scaler.style.webkitTransform = 'scale(' + scale + ')';
        scaler.style.transform       = 'scale(' + scale + ')';
        var offsetX = (window.innerWidth  - 1920 * scale) / 2;
        var offsetY = (window.innerHeight - 1080 * scale) / 2;
        scaler.style.left = offsetX + 'px';
        scaler.style.top  = offsetY + 'px';
      }
      window.addEventListener('load',   scaleApp);
      window.addEventListener('resize', scaleApp);

      // Request fullscreen on first user interaction (key or click).
      // This hides the browser chrome (URL bar, buttons) on Samsung Tizen
      // and any other browser that supports the Fullscreen API.
      function requestFullscreen() {
        var el = document.documentElement;
        var req = el.requestFullscreen
          || el.webkitRequestFullscreen
          || el.mozRequestFullScreen
          || el.msRequestFullscreen;
        if (req) {
          req.call(el).catch(function() {});
        }
        document.removeEventListener('keydown', requestFullscreen);
        document.removeEventListener('click',   requestFullscreen);
      }
      document.addEventListener('keydown', requestFullscreen);
      document.addEventListener('click',   requestFullscreen);

      // Samsung Tizen: register remote keys early so they fire as keydown.
      // Without this, the Smart Remote may only move the cursor pointer.
      try {
        if (window.tizen && window.tizen.tvinputdevice) {
          ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter','Return','Back'].forEach(function(k) {
            try { window.tizen.tvinputdevice.registerKey(k); } catch(e) {}
          });
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root">
      <div id="app-scaler"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
